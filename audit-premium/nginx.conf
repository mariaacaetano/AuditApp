server {
    listen 80;
    server_name localhost;

    # Localização onde os arquivos estáticos compilados do React foram salvos
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Garante que o roteamento de página única (SPA) funcione sem dar erro 404
        try_files $uri $uri/ /index.html;
    }

    # Proxy Reverso: Encaminha as requisições de API de forma transparente para o Django
    location /api/ {
        # "backend" refere-se ao nome do serviço de back-end configurado no docker-compose.yml
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Tratamento padrão para erros de servidor
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}